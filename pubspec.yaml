name: stock_quant_app
description: A high-performance stock trading application

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  # 路由管理
  auto_route: ^9.2.2
  # 依赖注入
  get_it: ^8.0.3
  # 网络请求
  dio: ^5.4.0
  # WebSocket
  web_socket_channel: ^3.0.1
  # 图表
  fl_chart: ^0.70.0
  candlesticks: ^2.1.0
  # 本地存储
  shared_preferences: ^2.2.2
  # 数据类生成
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.20.1
  rxdart: ^0.28.0
  logging: ^1.2.0
  riverpod_annotation: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Linting
  flutter_lints: ^5.0.0
  # 代码生成
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  auto_route_generator: ^9.0.0
  mockito: ^5.4.4
  test: ^1.24.9
  golden_toolkit: ^0.15.0
  riverpod_generator: ^2.3.9
